<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词语炼金术 - Word Alchemy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a0a2e 0%, #0d0221 100%);
            color: #e0d5ff;
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 36px;
            background: linear-gradient(90deg, #ff6b9d, #c44569, #f8b500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 14px;
        }
        
        /* 游戏区域 */
        .game-area {
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* 目标显示 */
        .target-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(196,69,105,0.2));
            border-radius: 15px;
            border: 2px solid rgba(255,107,157,0.3);
        }
        
        .target-label {
            font-size: 12px;
            color: #ff6b9d;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        
        .target-word {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,107,157,0.5);
        }
        
        /* 炼金台 */
        .alchemy-table {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            min-height: 120px;
        }
        
        .slot {
            width: 100px;
            height: 100px;
            background: rgba(0,0,0,0.3);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .slot:hover {
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1);
        }
        
        .slot.filled {
            border-style: solid;
            border-color: #ff6b9d;
            background: rgba(255,107,157,0.2);
        }
        
        .plus {
            font-size: 32px;
            color: #666;
        }
        
        .equals {
            font-size: 32px;
            color: #f8b500;
        }
        
        .result-slot {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(248,181,0,0.3), rgba(248,181,0,0.1));
            border: 2px solid #f8b500;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(248,181,0,0.3); }
            50% { box-shadow: 0 0 40px rgba(248,181,0,0.6); }
        }
        
        /* 操作按钮 */
        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,107,157,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 元素库 */
        .inventory {
            margin-top: 20px;
        }
        
        .inventory-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .elements-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        
        .element {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }
        
        .element:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .element.selected {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border-color: #ff6b9d;
        }
        
        /* 配方书 */
        .recipe-book {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }
        
        .recipe-title {
            font-size: 14px;
            color: #f8b500;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .recipes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        
        .recipe {
            padding: 8px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            font-size: 12px;
            color: #aaa;
        }
        
        .recipe.unlocked {
            background: rgba(248,181,0,0.2);
            color: #f8b500;
        }
        
        /* 消息提示 */
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px 50px;
            border-radius: 20px;
            border: 2px solid #f8b500;
            text-align: center;
            display: none;
            z-index: 1000;
        }
        
        .message.show {
            display: block;
            animation: popIn 0.3s;
        }
        
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .message-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .message-text {
            font-size: 18px;
            color: #fff;
        }
        
        /* 关卡信息 */
        .level-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        
        .level, .score {
            font-family: 'Courier New', monospace;
            color: #888;
        }
        
        .level span, .score span {
            color: #f8b500;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>🔮 词语炼金术</h1>
        <p class="subtitle">通过组合基础词语创造新概念</p>
    </header>
    
    <div class="game-area">
        <div class="level-info">
            <div class="level">关卡: <span id="level">1</span></div>
            <div class="score">得分: <span id="score">0</span></div>
        </div>
        
        <!-- 目标 -->
        <div class="target-section">
            <div class="target-label">目标词汇</div>
            <div class="target-word" id="targetWord">蒸汽</div>
        </div>
        
        <!-- 炼金台 -->
        <div class="alchemy-table">
            <div class="slot" id="slot1" onclick="selectSlot(1)"></div>
            <div class="plus">+</div>
            
            <div class="slot" id="slot2" onclick="selectSlot(2)"></div>
            <div class="equals">=</div>
            
            <div class="result-slot" id="resultSlot">❓</div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="actions">
            <button class="btn btn-primary" onclick="combine()" id="combineBtn">✨ 炼成</button>
            <button class="btn btn-secondary" onclick="clearSlots()">🔄 清空</button>
            <button class="btn btn-secondary" onclick="showHint()">💡 提示</button>
        </div>
        
        <!-- 元素库 -->
        <div class="inventory">
            <div class="inventory-title">基础元素 (点击选择)</div>
            <div class="elements-grid" id="elementsGrid">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <!-- 配方书 -->
        <div class="recipe-book">
            <div class="recipe-title">📖 已解锁配方</div>
            <div class="recipes" id="recipes">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>
    
    <!-- 消息提示 -->
    <div class="message" id="message">
        <div class="message-icon" id="messageIcon">✨</div>
        <div class="message-text" id="messageText">炼成成功！</div>
    </div>

    <script>
        // 游戏数据
        const recipes = {
            // 基础组合
            '火+水': '蒸汽',
            '火+土': '岩浆',
            '水+土': '泥浆',
            '火+风': '烟',
            '水+风': '云',
            '土+风': '沙尘',
            
            // 二级组合
            '蒸汽+水': '雾',
            '云+水': '雨',
            '雨+土': '植物',
            '植物+火': '灰烬',
            '岩浆+水': '石头',
            '石头+火': '金属',
            '金属+火': '工具',
            '植物+工具': '木材',
            '木材+火': '炭',
            
            // 三级组合
            '植物+云': '生命',
            '生命+水': '鱼',
            '鱼+工具': '食物',
            '生命+土': '人',
            '人+工具': '房子',
            '房子+生命': '家庭',
            '金属+石头': '城堡',
            '云+风': '风暴',
            '风暴+水': '海啸',
            
            // 特殊组合
            '人+火': '知识',
            '知识+人': '科学',
            '科学+金属': '机器',
            '机器+生命': '机器人',
            '家庭+爱': '幸福',
        };
        
        // 反向查找配方
        const recipeMap = {};
        Object.entries(recipes).forEach(([key, value]) => {
            recipeMap[value] = key.split('+');
        });
        
        // 游戏状态
        let level = 1;
        let score = 0;
        let unlockedElements = ['火', '水', '土', '风'];
        let unlockedRecipes = [];
        let selectedSlot = null;
        let slots = [null, null];
        
        // 关卡设计
        const levels = [
            { target: '蒸汽', hint: '火 + 水' },
            { target: '云', hint: '水 + 风' },
            { target: '植物', hint: '需要先制造雨' },
            { target: '石头', hint: '岩浆遇水变成石头' },
            { target: '金属', hint: '石头经过火炼' },
            { target: '生命', hint: '植物与云的结合' },
            { target: '人', hint: '生命诞生于土' },
            { target: '知识', hint: '人通过火获得智慧' },
            { target: '幸福', hint: '家庭需要什么？' },
        ];
        
        // 初始化
        function init() {
            renderElements();
            renderRecipes();
            loadLevel();
        }
        
        // 渲染元素库
        function renderElements() {
            const grid = document.getElementById('elementsGrid');
            grid.innerHTML = unlockedElements.map(el => 
                `\u003cdiv class="element" onclick="selectElement('${el}')" data-element="${el}"\u003e${el}\u003c/div\u003e`
            ).join('');
        }
        
        // 渲染配方书
        function renderRecipes() {
            const container = document.getElementById('recipes');
            if (unlockedRecipes.length === 0) {
                container.innerHTML = '\u003cspan style="color:#666"\u003e暂无已解锁配方\u003c/span\u003e';
                return;
            }
            container.innerHTML = unlockedRecipes.map(r => 
                `\u003cdiv class="recipe unlocked"\u003e${r.input.join('+')} = ${r.output}\u003c/div\u003e`
            ).join('');
        }
        
        // 加载关卡
        function loadLevel() {
            const lvl = levels[(level - 1) % levels.length];
            document.getElementById('targetWord').textContent = lvl.target;
            document.getElementById('level').textContent = level;
            clearSlots();
        }
        
        // 选择元素
        function selectElement(element) {
            // 移除其他选中状态
            document.querySelectorAll('.element').forEach(el => el.classList.remove('selected'));
            
            // 如果没有选中槽位，自动选择第一个空的
            if (selectedSlot === null) {
                if (slots[0] === null) selectedSlot = 1;
                else if (slots[1] === null) selectedSlot = 2;
                else selectedSlot = 1; // 都满了则替换第一个
            }
            
            // 放入槽位
            slots[selectedSlot - 1] = element;
            updateSlots();
            
            // 选中下一个槽位
            selectedSlot = selectedSlot === 1 ? 2 : 1;
            
            // 视觉反馈
            document.querySelector(`[data-element="${element}"]`).classList.add('selected');
        }
        
        // 选择槽位
        function selectSlot(num) {
            selectedSlot = num;
            updateSlots();
        }
        
        // 更新槽位显示
        function updateSlots() {
            slots.forEach((content, i) => {
                const slot = document.getElementById(`slot${i + 1}`);
                slot.textContent = content || '';
                slot.classList.toggle('filled', content !== null);
            });
            
            // 更新结果槽
            const resultSlot = document.getElementById('resultSlot');
            if (slots[0] && slots[1]) {
                const key1 = `${slots[0]}+${slots[1]}`;
                const key2 = `${slots[1]}+${slots[0]}`;
                const result = recipes[key1] || recipes[key2];
                resultSlot.textContent = result || '❓';
            } else {
                resultSlot.textContent = '❓';
            }
        }
        
        // 清空槽位
        function clearSlots() {
            slots = [null, null];
            selectedSlot = null;
            updateSlots();
            document.querySelectorAll('.element').forEach(el => el.classList.remove('selected'));
        }
        
        // 炼成
        function combine() {
            if (!slots[0] || !slots[1]) {
                showMessage('⚠️', '请先选择两个元素');
                return;
            }
            
            const key1 = `${slots[0]}+${slots[1]}`;
            const key2 = `${slots[1]}+${slots[0]}`;
            const result = recipes[key1] || recipes[key2];
            
            if (result) {
                // 检查是否是目标
                const target = document.getElementById('targetWord').textContent;
                
                // 解锁新元素
                if (!unlockedElements.includes(result)) {
                    unlockedElements.push(result);
                    renderElements();
                }
                
                // 特殊解锁：合成家庭后自动解锁爱
                if (result === '家庭' && !unlockedElements.includes('爱')) {
                    unlockedElements.push('爱');
                    renderElements();
                    showMessage('❤️', '解锁新元素：爱');
                }
                
                // 记录配方
                const recipeKey = slots.sort().join('+');
                if (!unlockedRecipes.find(r => r.output === result)) {
                    unlockedRecipes.push({ input: slots.slice().sort(), output: result });
                    renderRecipes();
                }
                
                if (result === target) {
                    // 过关
                    score += 100;
                    document.getElementById('score').textContent = score;
                    showMessage('✨', `炼成成功！获得: ${result}`);
                    
                    setTimeout(() => {
                        level++;
                        loadLevel();
                    }, 1500);
                } else {
                    showMessage('✓', `炼成: ${result}`);
                }
                
                clearSlots();
            } else {
                showMessage('✗', '这两个元素无法组合');
            }
        }
        
        // 显示提示
        function showHint() {
            const lvl = levels[(level - 1) % levels.length];
            showMessage('💡', lvl.hint);
        }
        
        // 显示消息
        function showMessage(icon, text) {
            document.getElementById('messageIcon').textContent = icon;
            document.getElementById('messageText').textContent = text;
            document.getElementById('message').classList.add('show');
            
            setTimeout(() => {
                document.getElementById('message').classList.remove('show');
            }, 2000);
        }
        
        // 启动
        init();
    </script>
</body>
</html>
